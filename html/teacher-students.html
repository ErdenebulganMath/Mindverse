<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduLearn – Сурагчид</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/teacher.css">
  <link rel="stylesheet" href="../css/teacher-students.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="sidebar-container"></div>

<div class="page">
<div class="students-layout">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left-panel">

    <div class="lp-header">
      <h1><i class="fas fa-user-graduate"></i>Сурагчид</h1>
      <p>Ангиар шүүж харах боломжтой</p>
    </div>

    <!-- Mini stats -->
    <div class="lp-stats">
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#dbeafe;color:#1d4ed8"><i class="fas fa-users"></i></div>
        <div class="lp-stat-val">84</div>
        <div class="lp-stat-lbl">Нийт сурагч</div>
      </div>
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#d1fae5;color:#065f46"><i class="fas fa-trophy"></i></div>
        <div class="lp-stat-val">88%</div>
        <div class="lp-stat-lbl">Хамгийн өндөр</div>
      </div>
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#fef3c7;color:#92400e"><i class="fas fa-chart-line"></i></div>
        <div class="lp-stat-val">74%</div>
        <div class="lp-stat-lbl">Нийт дундаж</div>
      </div>
      <div class="lp-stat">
        <div class="lp-stat-icon" style="background:#fee2e2;color:#991b1b"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="lp-stat-val">8</div>
        <div class="lp-stat-lbl">Анхааруулга</div>
      </div>
    </div>

    <div class="lp-section-label">Анги сонгох</div>

    <!-- Class filter cards -->
    <div class="cls-filters-wrap" id="classFilterCards"></div>

  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">

    <div class="rp-toolbar">
      <div class="rp-search">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Сурагчийн нэрээр хайх..." oninput="filterStudents()">
      </div>
      <select class="rp-sort" onchange="sortStudents(this.value)">
        <option value="score-desc">Оноогоор ↓</option>
        <option value="score-asc">Оноогоор ↑</option>
        <option value="name-asc">Нэрээр А–Я</option>
        <option value="class">Ангиар</option>
      </select>
      <div class="rp-count" id="rpCount"><span id="rpCountNum">29</span> сурагч</div>
    </div>

    <div class="student-table-wrap">
      <table class="student-table">
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th>Сурагч</th>
            <th>Анги</th>
            <th>Шалгалт</th>
            <th>Даалгавар</th>
            <th style="text-align:right">Дундаж оноо</th>
          </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
      </table>
      <div class="no-results" id="noResults" style="display:none">
        <i class="fas fa-search"></i>
        <p>Хайлтад тохирох сурагч олдсонгүй</p>
      </div>
    </div>

  </div>
</div>
</div>

<!-- Student Detail Modal -->
<div class="std-overlay" id="stdOverlay" onclick="if(event.target===this)closeStdModal()">
  <div class="std-modal">
    <button class="std-close-btn" onclick="closeStdModal()"><i class="fas fa-times"></i></button>
    <div class="std-modal-header" id="stdModalHeader"></div>
    <div class="std-modal-body"   id="stdModalBody"></div>
  </div>
</div>

<script src="../js/load.js"></script>
<script src="../js/teacher-students.js"></script>
</body>
</html>
